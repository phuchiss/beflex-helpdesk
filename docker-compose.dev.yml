services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: helpdesk_dev
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdesk_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
